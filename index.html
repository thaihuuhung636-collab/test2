<!doctype html>
<html><head><meta charset="utf-8"/><title>Flood Impact WebGIS</title><meta name="viewport" content="width=device-width,initial-scale=1"/>

<style>

round:#f7f7f7;padding:8px;border-radius:8px;margin-top:8px}.attrTable{border-collapse:collapse;width:100%;font-size:12px}.attrTable th{background:#e8eef5;text-align:left;padding:5px;border:1px solid #cfd8dc}.attrTable td{padding:5px;border:1px solid #cfd8dc;vertical-align:top}.legendTitle{font-weight:800;color:#0d47a1;margin:4px 0 5px}.layerName{display:flex;align-items:center;gap:6px;margin:3px 0;padding:3px 4px;border-radius:6px;background:#eef6ff}.layerDot{width:12px;height:12px;border-radius:3px;background:#1a73e8;border:1px solid #0d47a1;display:inline-block}select{border-radius:8px;padding:6px;border:1px solid #ccc}.clickModes{margin-top:7px;padding-top:7px;border-top:1px solid #e0e6ee;display:flex;gap:10px;flex-wrap:wrap;font-size:12px}.clickModes label{background:#f7fbff;border:1px solid #d7e5f4;border-radius:8px;padding:5px 8px;font-weight:700;color:#123}.clickModes input{margin-right:5px;vertical-align:middle}@media(max-width:900px){.side{width:270px}.panel{left:285px;right:10px;width:auto;max-width:none}.legend{left:285px}.chart{height:300px}}
</style></head><body><div id="app"><aside class="side"><div class="brand">Flood Impact WebGIS</div><input id="layerSearch" class="search" placeholder="Tìm kiếm layer..."/><div class="groupTitle">Độ sâu ngập lụt</div><div id="floodLayers"></div><div class="groupTitle">Lớp nền</div><div id="baseLayers"></div></aside><main id="map"></main><div class="legend" id="legend"></div><div class="panel" id="attrPanel" style="display:none"><h3>Thuộc tính đối tượng</h3><div id="attr" class="attr"></div><div class="row"><button id="closeAttr">Đóng bảng thuộc tính</button></div></div><div class="panel" id="tsPanel" style="display:none"><h3>Timeseries vị trí</h3><div id="pointInfo" class="muted"></div><div id="chart" class="chart"></div><div class="row"><button id="csv">CSV timeseries</button><button id="savepts">Lưu điểm CSV</button><label class="file">Load điểm <input id="loadpts" type="file" accept=".csv"></label><button id="clearpts">Xóa điểm</button></div></div><div class="ctl"><div class="row"><button id="prev">⏮</button><button id="play">▶</button><button id="pause">⏸</button><button id="next">⏭</button><label>Basemap</label><select id="basemap"><option value="street">Phố</option><option value="satellite">Vệ tinh</option><option value="none">Không nền</option></select></div><input id="frame" type="range" min="0" max="0" value="0"><div class="row"><b id="time">--</b><span id="frameText" class="muted"></span></div><div class="clickModes"><label><input id="clickObjMode" type="checkbox"> Click chọn đối tượng nền</label><label><input id="clickTsMode" type="checkbox"> Click hiển thị timeseries ngập</label></div></div></div>
